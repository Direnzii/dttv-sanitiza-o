<!doctype html>
<html lang="pt-BR" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Gerenciador de Agenda e Serviços (PWA) — Clientes, Serviços, Orçamentos e Dashboard offline." />

    <link rel="manifest" href="./manifest.json" />
    <link id="favicon" rel="icon" href="./assets/icons/icon.svg" type="image/svg+xml" />
    <link id="apple-touch-icon" rel="apple-touch-icon" href="./assets/icons/icon-192.svg" />
    <link rel="stylesheet" href="./styles.css" />

    <!-- Tailwind via CDN (agilidade) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Config leve para manter a UI consistente sem build step.
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            boxShadow: {
              soft: "0 10px 25px rgba(2,6,23,0.08)",
            },
          },
        },
      };
    </script>

    <!-- Ícones (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- PDF (jsPDF UMD) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <title>DTTV — Agenda & Serviços</title>
  </head>
  <body class="h-full bg-slate-50 text-slate-900 antialiased dark:bg-slate-950 dark:text-slate-50">
    <div id="app" class="min-h-full">
      <!-- Header -->
      <header class="sticky top-0 z-30 border-b border-slate-200/80 bg-white/80 backdrop-blur dark:border-slate-700/50 dark:bg-slate-900/80">
        <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
          <div class="flex items-center gap-3">
            <div id="app-logo" class="grid h-10 w-10 place-items-center overflow-hidden rounded-xl bg-slate-900 text-white shadow-soft">
              <span id="app-logo-text" class="text-sm font-semibold tracking-tight">D</span>
              <img id="app-logo-img" class="hidden h-full w-full object-cover" alt="DTTV" />
            </div>
            <div>
              <div class="text-sm font-semibold leading-5">DTTV</div>
              <div class="text-xs text-slate-500">Agenda & Serviços</div>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <button
              id="btn-update"
              class="hidden items-center gap-2 rounded-lg bg-amber-500 px-3 py-2 text-sm font-medium text-white shadow-sm hover:bg-amber-600"
              type="button"
              title="Atualizar app"
            >
              <i data-lucide="refresh-cw" class="h-4 w-4"></i>
              Atualizar
            </button>
            <button
              id="btn-install"
              class="hidden items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700"
              type="button"
              title="Instalar app"
            >
              <i data-lucide="download" class="h-4 w-4"></i>
              Instalar
            </button>
            <button
              id="btn-quick-backup"
              class="inline-flex items-center gap-2 rounded-lg bg-slate-900 px-3 py-2 text-sm font-medium text-white shadow-soft hover:bg-slate-800"
              type="button"
              title="Exportar backup"
            >
              <i data-lucide="download" class="h-4 w-4"></i>
              Backup
            </button>
          </div>
        </div>
      </header>

      <!-- Layout -->
      <div class="mx-auto grid max-w-6xl grid-cols-1 gap-4 px-4 py-4 md:grid-cols-[240px_1fr] md:py-6">
        <!-- Sidebar (desktop) -->
        <aside class="hidden md:block">
          <nav class="sticky top-20 rounded-2xl border border-slate-200 bg-white p-2 shadow-sm dark:border-slate-700 dark:bg-slate-800">
            <div class="px-3 pb-2 pt-3 text-xs font-semibold uppercase tracking-wider text-slate-500">Navegação</div>
            <div class="space-y-1">
              <button class="nav-btn w-full" data-route="home" type="button">
                <i data-lucide="layout-dashboard" class="h-4 w-4"></i>
                Dashboard
              </button>
              <button class="nav-btn w-full" data-route="records" type="button">
                <i data-lucide="calendar-days" class="h-4 w-4"></i>
                Agenda
              </button>
              <button class="nav-btn w-full" data-route="clients" type="button">
                <i data-lucide="users" class="h-4 w-4"></i>
                Clientes
              </button>
              <button class="nav-btn w-full" data-route="services" type="button">
                <i data-lucide="briefcase" class="h-4 w-4"></i>
                Serviços
              </button>
              <button class="nav-btn w-full" data-route="budgets" type="button">
                <i data-lucide="file-text" class="h-4 w-4"></i>
                Orçamentos & PDF
              </button>
              <button class="nav-btn w-full" data-route="notifications" type="button">
                <i data-lucide="bell" class="h-4 w-4"></i>
                Notificações
              </button>
              <button class="nav-btn w-full" data-route="backup" type="button">
                <i data-lucide="settings" class="h-4 w-4"></i>
                Config
              </button>
            </div>
          </nav>
        </aside>

        <!-- Main -->
        <main class="space-y-4">
          <div id="view" class="min-h-[60vh]"></div>

          <!-- Espaço extra para não ficar atrás do menu mobile -->
          <div class="h-24 md:h-0"></div>
        </main>
      </div>

      <!-- Bottom Nav (mobile) -->
      <nav class="fixed inset-x-0 bottom-0 z-40 border-t border-slate-200 bg-white/90 backdrop-blur dark:border-slate-700 dark:bg-slate-900/90 md:hidden">
        <div class="mx-auto grid max-w-6xl grid-cols-7 gap-1 px-1 py-2">
          <button class="nav-btn nav-btn--compact" data-route="home" type="button" title="Dashboard">
            <i data-lucide="layout-dashboard" class="h-5 w-5"></i>
            <span class="nav-btn__label">Home</span>
          </button>
          <button class="nav-btn nav-btn--compact" data-route="records" type="button" title="Agenda">
            <i data-lucide="calendar-days" class="h-5 w-5"></i>
            <span class="nav-btn__label">Agenda</span>
          </button>
          <button class="nav-btn nav-btn--compact" data-route="clients" type="button" title="Clientes">
            <i data-lucide="users" class="h-5 w-5"></i>
            <span class="nav-btn__label">Clientes</span>
          </button>
          <button class="nav-btn nav-btn--compact" data-route="services" type="button" title="Serviços">
            <i data-lucide="briefcase" class="h-5 w-5"></i>
            <span class="nav-btn__label">Serviços</span>
          </button>
          <button class="nav-btn nav-btn--compact" data-route="budgets" type="button" title="Orçamentos">
            <i data-lucide="file-text" class="h-5 w-5"></i>
            <span class="nav-btn__label">ORC</span>
          </button>
          <button class="nav-btn nav-btn--compact" data-route="notifications" type="button" title="Notificações">
            <span class="nav-btn__icon relative inline-flex">
              <i data-lucide="bell" class="h-5 w-5"></i>
              <span
                id="nav-badge-notifications"
                class="pointer-events-none absolute -right-2 -top-1 hidden min-w-[18px] rounded-full bg-rose-600 px-1.5 text-center text-[10px] font-bold leading-[18px] text-white ring-2 ring-white"
              ></span>
            </span>
            <span class="nav-btn__label">Alertas</span>
          </button>
          <button class="nav-btn nav-btn--compact" data-route="backup" type="button" title="Config">
            <i data-lucide="settings" class="h-5 w-5"></i>
            <span class="nav-btn__label">Config</span>
          </button>
        </div>
      </nav>

      <!-- UI roots -->
      <div id="toasts" class="pointer-events-none fixed right-3 top-16 z-[1000] space-y-2 md:top-20"></div>
      <div id="modal-root"></div>
    </div>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
